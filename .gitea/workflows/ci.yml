name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # aislop (@schoen scope) installs from the self-hosted Gitea npm registry,
      # which serves a self-signed (mkcert) cert. Point Node at the committed
      # public root CA so npm trusts it. NODE_EXTRA_CA_CERTS *appends* to the
      # default CA bundle, so transitive deps from public npm still verify.
      NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/.gitea-ca.pem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: python -m py_compile statusline.py subagent_statusline.py install.py nudge_200k.py statusline_lib/*.py
      - name: Lint (ruff)
        # The validation gate. Config lives in pyproject.toml; 0 findings is
        # the bar. This step is the hard gate that blocks merge on regression.
        run: |
          pip install ruff
          ruff check .
          ruff format --check .
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install aislop (lockfile-pinned, no install scripts)
        # aislop (@schoen/aislop, the fork build) is vendored as a devDependency;
        # package-lock.json carries the integrity hashes and the Gitea registry
        # URL. `npm ci` installs exactly the locked tree and verifies those
        # hashes; --ignore-scripts blocks dependency lifecycle scripts. This
        # replaces `npx --yes aislop@x`, which fetched from the live registry
        # without integrity verification on every run.
        #
        # --ignore-scripts skips aislop's postinstall, so the bundled ruff is not
        # downloaded; aislop resolves ruff from PATH instead, which the earlier
        # "Lint (ruff)" step already installed (src/utils/tooling.ts).
        run: npm ci --ignore-scripts
      - name: AI-slop gate (aislop)
        # Whole-repo AI-slop score gate. failBelow + exclusions in
        # .aislop/config.yml. The repo currently scores 100/100. Runs the
        # `lint:aislop` script (-> local node_modules/.bin/aislop ci .).
        run: npm run lint:aislop
      - name: Type check (pyright, non-blocking)
        # Informational for now. Drop the `|| true` to hard-fail once the
        # codebase is clean against pyright.
        run: |
          pip install pyright
          pyright || true
      - name: Lint shell (shellcheck, non-blocking)
        # Informational until the .sh scripts are triaged to 0 findings, then
        # drop the `|| true` to make it a hard gate like ruff.
        run: shellcheck $(git ls-files '*.sh') || true

  test:
    name: Unit tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install optional runtime deps
        # psutil is import-guarded in statusline_lib, but installing it lets the
        # suite exercise the real process-enumeration path instead of the mtime
        # fallback.
        run: pip install psutil
      - name: Run verification scripts
        # Run every scripts/verify_*.py; collect failures so one bad script
        # doesn't mask the others, then fail the job if any failed. (Don't rely
        # on `set -e` aborting inside the loop -- track explicitly.)
        run: |
          fail=0
          for t in scripts/verify_*.py; do
            echo "=== $t ==="
            python "$t" || fail=1
          done
          exit $fail

  test-windows:
    name: Unit tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      # Force UTF-8 so the statusline's glyphs (yin-yang, arrows, dots) don't trip
      # UnicodeEncodeError on the Windows console's cp1252 codepage.
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.11 (python-build-standalone)
        # setup-python@v5 and the python.org MSI both fail under the SYSTEM-account
        # WinSW runner (WOW64 path redirection / SYSTEM ACLs break registration);
        # the portable tarball just unpacks with the runner's tar.exe. See local-ci
        # docs/project-ci-setup.md "Python install on the Windows runner".
        shell: pwsh
        run: |
          $pyDir = "C:\hostedtoolcache\Python311"
          if (-not (Test-Path "$pyDir\python.exe")) {
            $url = "https://github.com/astral-sh/python-build-standalone/releases/download/20260414/cpython-3.11.15+20260414-x86_64-pc-windows-msvc-install_only.tar.gz"
            $tar = Join-Path $env:RUNNER_TEMP "python-3.11.tar.gz"
            Invoke-WebRequest -Uri $url -OutFile $tar -UseBasicParsing
            New-Item -ItemType Directory -Force -Path $pyDir | Out-Null
            tar -xzf $tar -C $pyDir --strip-components=1
            if (-not (Test-Path "$pyDir\python.exe")) {
              throw "tar extracted but python.exe not at $pyDir\python.exe"
            }
          }
          & "$pyDir\python.exe" --version
          "$pyDir"         | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "$pyDir\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install optional runtime deps
        # psutil exercises the real process-enumeration path in the active-session
        # check instead of the mtime fallback (matches the Linux test job).
        shell: pwsh
        run: pip install psutil

      - name: Check syntax (py_compile)
        shell: pwsh
        run: |
          $files = Get-ChildItem statusline_lib/*.py | ForEach-Object { $_.FullName }
          $files += 'statusline.py', 'subagent_statusline.py', 'install.py', 'nudge_200k.py'
          python -m py_compile @files

      - name: Run verification scripts
        # The same scripts/verify_*.py suite the Linux job runs, on Windows. Collect
        # failures so one bad script doesn't mask the others, then fail if any did.
        shell: pwsh
        run: |
          $fail = 0
          Get-ChildItem scripts/verify_*.py | ForEach-Object {
            Write-Host "=== $($_.Name) ==="
            python $_.FullName
            if ($LASTEXITCODE -ne 0) { $fail = 1 }
          }
          exit $fail
